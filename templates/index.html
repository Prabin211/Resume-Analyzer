<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            color: white;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: rgba(255,255,255,0.08);
            backdrop-filter: blur(12px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.4);
        }

        h2 {
            text-align: center;
            font-size: 28px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        textarea {
            resize: none;
        }

        button {
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(45deg, #00c6ff, #0072ff);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.03);
        }

        .tag {
            display: inline-block;
            background: #00c6ff;
            padding: 6px 12px;
            margin: 5px;
            border-radius: 20px;
            font-size: 12px;
        }

        .missing {
            background: red;
        }

        .result {
            margin-top: 30px;
        }

        /* 🤖 Robot icon animation */
        .robot {
            display: inline-block;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-6px); }
        }

    </style>
</head>

<body>

<div class="container">
    <h2>🤖 AI Resume Analyzer</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <input type="file" name="file" required>

        <textarea name="job_description" placeholder="Paste job description..."></textarea>

        <button type="submit">Analyze Resume</button>
    </form>

    {% if result %}
    <div class="result">

        <h3>Skills</h3>
        {% for skill in result.skills %}
            <span class="tag">{{ skill }}</span>
        {% endfor %}

        <h3>Missing Skills</h3>
        {% for skill in result.missing_skills %}
            <span class="tag missing">{{ skill }}</span>
        {% endfor %}

        <h3>Performance</h3>
        <canvas id="scoreChart"></canvas>

    </div>

    <script>
        const ctx = document.getElementById('scoreChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['ATS Score', 'Match %'],
                datasets: [{
                    label: 'Performance',
                    data: [{{ result.score|default:0 }}, {{ result.match_percentage|default:0 }}],
                    backgroundColor: ['#00c6ff', '#ff9800']
                }]
            },
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    },
                    title: {
                        display: true,
                        text: 'Resume Analysis',
                        color: 'white'
                    }
                },
                scales: {
                    x: {
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: '#ffffff30'
                        }
                    },
                    y: {
                        beginAtZero: true,
                        max: 100,
                        ticks: {
                            color: 'white'
                        },
                        grid: {
                            color: '#ffffff30'
                        }
                    }
                }
            }
        });
    </script>
    {% endif %}

</div>

</body>
</html>
