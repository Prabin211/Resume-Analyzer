<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            margin: 0;
            color: white;
        }

        .container {
            width: 60%;
            margin: 50px auto;
            background: #ffffff10;
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 8px 30px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
            border: none;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background: #00c6ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #0072ff;
        }

        .tag {
            display: inline-block;
            background: #00c6ff;
            padding: 6px 12px;
            margin: 5px;
            border-radius: 20px;
            font-size: 12px;
        }

        .missing {
            background: red;
        }

        .result {
            margin-top: 30px;
        }

        /* 🚀 Loader */
        .loader {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .moon {
            width: 60px;
            height: 60px;
            background: #ccc;
            border-radius: 50%;
            margin: auto;
            position: relative;
        }

        .rocket {
            width: 20px;
            height: 20px;
            background: orange;
            border-radius: 50%;
            position: absolute;
            animation: orbit 2s linear infinite;
        }

        @keyframes orbit {
            0% { transform: rotate(0deg) translateX(40px) rotate(0deg); }
            100% { transform: rotate(360deg) translateX(40px) rotate(-360deg); }
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🚀 AI Resume Analyzer</h2>

    <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">
        {% csrf_token %}

        <input type="file" name="file" required>

        <textarea name="job_description" placeholder="Paste job description..."></textarea>

        <button type="submit">Analyze Resume</button>
    </form>

    <!-- 🚀 Loader -->
    <div class="loader" id="loader">
        <p>Analyzing your resume...</p>
        <div class="moon">
            <div class="rocket"></div>
        </div>
    </div>

    {% if result %}
    <div class="result">

        <h3>Skills</h3>
        {% for skill in result.skills %}
            <span class="tag">{{ skill }}</span>
        {% endfor %}

        <h3>Missing Skills</h3>
        {% for skill in result.missing_skills %}
            <span class="tag missing">{{ skill }}</span>
        {% endfor %}

        <h3>Scores</h3>
        <canvas id="scoreChart"></canvas>

    </div>

    <script>
        const ctx = document.getElementById('scoreChart');

        new Chart(ctx, {
            type: 'bar',
            data: {
                labels: ['ATS Score', 'Match %'],
                datasets: [{
                    label: 'Performance',
                    data: [{{ result.score|default:0 }}, {{ result.match_percentage|default:0 }}],
                }]
            },
            options: {
                scales: {
                    y: {
                        beginAtZero: true,
                        max: 100
                    }
                }
            }
        });
    </script>
    {% endif %}
</div>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
